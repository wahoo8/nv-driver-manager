# NVIDIA Driver Manager configuration

NDM_CACHE_DIR="${NDM_CACHE_DIR:-/var/cache/nvidia-driver-manager}"
NDM_LOG_DIR="/var/log/nvidia-driver-manager"
NDM_CACHE_PAGES_SUBDIR="pages"
NDM_CACHE_DOWNLOADS_SUBDIR="downloads"
NDM_CACHE_STATE_SUBDIR="state"
NDM_CACHE_CHECKSUMS_SUBDIR="checksums"
NDM_CACHE_LOGS_SUBDIR="logs"

NDM_NVIDIA_UNIX_URL="https://www.nvidia.com/en-us/drivers/unix/"
NDM_DOWNLOAD_BASE_URL="https://us.download.nvidia.com/XFree86/Linux-x86_64"

NDM_KEEP_INSTALLERS="2"
NDM_DEBUG="0"

NDM_METADATA_MAX_AGE="86400"

# Secure Boot
NDM_MOK_KEY="/var/lib/dkms/MOK.key"
NDM_MOK_CERT="/var/lib/dkms/MOK.der"

# NVIDIA installer options
NDM_NVIDIA_INSTALL_OPTIONS="--dkms --allow-installation-with-running-driver --kernel-module-type=open --no-rebuild-initramfs"

# Future options
NDM_KEEP_DOWNLOADS="yes"
NDM_VERIFY_DKMS_AFTER_INSTALL="yes"
NDM_REBOOT_PROMPT="yes"

NDM_FORCE_TTY_INSTALL="yes"

NDM_NVIDIA_KERNEL_MODULE_TYPE="open"
