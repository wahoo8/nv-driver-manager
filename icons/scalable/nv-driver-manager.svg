<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">NV Driver Manager icon</title>
  <desc id="desc">A dark rounded-square application icon with a bright green merged N and V monogram.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#252525"/>
      <stop offset="0.55" stop-color="#111111"/>
      <stop offset="1" stop-color="#050505"/>
    </linearGradient>

    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b7ff00"/>
      <stop offset="0.45" stop-color="#76c900"/>
      <stop offset="1" stop-color="#3f9d00"/>
    </linearGradient>

    <linearGradient id="greenHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d6ff54" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#8be000" stop-opacity="0.0"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#8bf000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="34" y="34" width="444" height="444" rx="94" fill="none" stroke="#3a3a3a" stroke-width="4" opacity="0.9"/>
  <rect x="38" y="38" width="436" height="436" rx="90" fill="none" stroke="#000000" stroke-width="2" opacity="0.45"/>

  <!-- NV monogram. Shared center slant forms the N diagonal and the right stroke of V. -->
  <g filter="url(#softGlow)">
    <!-- Left vertical stroke of N -->
    <path d="M122 140 L184 140 L184 372 L122 372 Z" fill="url(#green)"/>

    <!-- Shared diagonal stroke: N diagonal and V right stroke -->
    <path d="M174 140 L238 140 L304 275 L248 331 Z" fill="url(#green)"/>
    <path d="M248 331 L397 140 L456 140 L278 403 Z" fill="url(#green)"/>

    <!-- Left stroke of V, protruding from inside/left of N -->
    <path d="M175 260 L222 260 L278 403 L248 331 Z" fill="url(#green)"/>
  </g>

  <!-- Subtle bevel/highlight lines -->
  <path d="M127 145 L181 145" stroke="url(#greenHighlight)" stroke-width="6" stroke-linecap="square" opacity="0.85"/>
  <path d="M181 145 L302 274" stroke="url(#greenHighlight)" stroke-width="6" stroke-linecap="square" opacity="0.45"/>
  <path d="M253 326 L399 145" stroke="url(#greenHighlight)" stroke-width="6" stroke-linecap="square" opacity="0.55"/>
  <path d="M180 265 L221 265" stroke="url(#greenHighlight)" stroke-width="5" stroke-linecap="square" opacity="0.6"/>
</svg>
