# NVIDIA Driver Manager configuration

NDM_CACHE_DIR="${HOME}/.cache/nvidia-driver-manager"
NDM_LOG_DIR="/var/log/nvidia-driver-manager"
NDM_CACHE_PAGES_SUBDIR="pages"
NDM_CACHE_DOWNLOADS_SUBDIR="downloads"
NDM_CACHE_STATE_SUBDIR="state"
NDM_CACHE_CHECKSUMS_SUBDIR="checksums"
NDM_CACHE_LOGS_SUBDIR="logs"

NDM_NVIDIA_UNIX_URL="https://www.nvidia.com/en-us/drivers/unix/"
NDM_DOWNLOAD_BASE_URL="https://us.download.nvidia.com/XFree86/Linux-x86_64"

NDM_KEEP_INSTALLERS="2"
NDM_DEBUG="0"

NDM_METADATA_MAX_AGE="86400"
